<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Quest – SMP Fun Quiz!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green:   #2DC653;
    --yellow:  #FFD600;
    --orange:  #FF7043;
    --blue:    #2196F3;
    --purple:  #9C27B0;
    --pink:    #E91E8C;
    --bg:      #FFF8E1;
    --card:    #FFFFFF;
    --text:    #1A1A2E;
    --shadow:  0 8px 32px rgba(0,0,0,0.13);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* === CONFETTI BG === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 20%, #FFD60033 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #2DC65333 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #2196F311 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .floating-emoji {
    position: fixed;
    font-size: 2rem;
    opacity: 0.13;
    pointer-events: none;
    animation: floatUp 8s linear infinite;
    z-index: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.13; }
    90%  { opacity: 0.13; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* === SCREEN SYSTEM === */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* === WELCOME SCREEN === */
  #welcome {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  .hero-box {
    background: var(--card);
    border-radius: 32px;
    padding: 3rem 2.5rem;
    max-width: 520px;
    width: 100%;
    box-shadow: var(--shadow);
    border: 4px solid var(--yellow);
    position: relative;
    overflow: hidden;
  }
  .hero-box::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: var(--yellow);
    border-radius: 50%;
    opacity: 0.18;
  }
  .hero-mascot { font-size: 5rem; margin-bottom: 0.5rem; animation: bounce 1.5s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }

  .hero-box h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--orange);
    line-height: 1.1;
    margin-bottom: 0.4rem;
  }
  .hero-box .subtitle {
    font-size: 1.05rem;
    color: #555;
    margin-bottom: 1.5rem;
  }
  .badge-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1.8rem;
  }
  .badge {
    padding: 0.35rem 0.9rem;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.82rem;
    color: #fff;
  }
  .badge.vocab  { background: var(--purple); }
  .badge.plural { background: var(--blue);   }
  .badge.tense  { background: var(--green);  }

  .name-input {
    width: 100%;
    padding: 0.8rem 1.2rem;
    border: 3px solid var(--yellow);
    border-radius: 16px;
    font-size: 1.05rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    outline: none;
    margin-bottom: 1.2rem;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--orange); }

  .btn-start {
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: #fff;
    border: none;
    padding: 1rem 2.5rem;
    border-radius: 999px;
    font-size: 1.2rem;
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,112,67,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }
  .btn-start:hover { transform: scale(1.06); box-shadow: 0 10px 28px rgba(255,112,67,0.5); }

  .info-strip {
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: #888;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .info-strip span { display: flex; align-items: center; gap: 4px; }

  /* === QUIZ SCREEN === */
  #quiz {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  /* Header bar */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
    background: var(--card);
    border-radius: 20px;
    padding: 0.8rem 1.2rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    gap: 1rem;
  }
  .player-name {
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    color: var(--orange);
    font-size: 1rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .progress-wrap { flex: 1; }
  .progress-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: #888;
    margin-bottom: 3px;
    text-align: right;
  }
  .progress-bar {
    height: 10px;
    background: #eee;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--green), var(--yellow));
    transition: width 0.4s ease;
    width: 0%;
  }
  .score-badge {
    background: var(--yellow);
    color: var(--text);
    font-weight: 800;
    font-size: 0.9rem;
    padding: 0.35rem 0.8rem;
    border-radius: 999px;
    white-space: nowrap;
    font-family: 'Baloo 2', cursive;
  }

  /* Section label */
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0.3rem 1rem;
    border-radius: 999px;
    font-weight: 800;
    font-size: 0.82rem;
    color: #fff;
    margin-bottom: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sec-verb    { background: var(--green); }
  .sec-mc      { background: var(--blue); }
  .sec-fill    { background: var(--purple); }
  .sec-rearr   { background: var(--pink); }

  /* Question card */
  .question-card {
    background: var(--card);
    border-radius: 24px;
    padding: 1.8rem 1.6rem;
    box-shadow: var(--shadow);
    border-top: 6px solid var(--green);
    animation: slideIn 0.35s ease;
    margin-bottom: 1rem;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-num {
    font-size: 0.82rem;
    font-weight: 800;
    color: #bbb;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .q-text {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 1.3rem;
  }
  .q-text .blank {
    display: inline-block;
    border-bottom: 3px solid var(--orange);
    min-width: 80px;
    text-align: center;
    color: var(--orange);
    font-weight: 800;
  }

  /* Story box for fill-in */
  .story-box {
    background: #FFF3E0;
    border-left: 5px solid var(--orange);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    font-size: 1.05rem;
    line-height: 1.9;
    margin-bottom: 1.3rem;
    color: var(--text);
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 0.65rem; }
  .option-btn {
    background: #F7F7F7;
    border: 2.5px solid #E0E0E0;
    border-radius: 14px;
    padding: 0.75rem 1.1rem;
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--blue); background: #E3F2FD; transform: translateX(4px); }
  .option-btn.correct { background: #E8F5E9; border-color: var(--green); color: #1B5E20; }
  .option-btn.wrong   { background: #FFEBEE; border-color: #E53935; color: #B71C1C; }
  .option-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #E0E0E0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.82rem;
    font-weight: 800;
    flex-shrink: 0;
    transition: background 0.18s;
  }
  .option-btn.correct .option-letter { background: var(--green); color: #fff; }
  .option-btn.wrong   .option-letter { background: #E53935;      color: #fff; }

  /* Text input style */
  .ans-input {
    width: 100%;
    padding: 0.8rem 1.1rem;
    border: 3px solid #E0E0E0;
    border-radius: 14px;
    font-size: 1.05rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
    background: #F7F7F7;
  }
  .ans-input:focus { border-color: var(--blue); background: #fff; }
  .ans-input.correct { border-color: var(--green); background: #E8F5E9; color: #1B5E20; }
  .ans-input.wrong   { border-color: #E53935;      background: #FFEBEE; color: #B71C1C; }

  /* Rearrange drag tiles */
  .word-pool, .sentence-drop {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 52px;
    padding: 0.7rem;
    border-radius: 14px;
    margin-bottom: 0.8rem;
  }
  .word-pool {
    background: #F3E5F5;
    border: 2.5px dashed var(--purple);
  }
  .sentence-drop {
    background: #E8EAF6;
    border: 2.5px dashed var(--blue);
  }
  .sentence-drop .drop-label {
    color: #aaa; font-size: 0.9rem; font-weight: 700;
    align-self: center;
    width: 100%;
    text-align: center;
    pointer-events: none;
  }
  .word-tile {
    background: #fff;
    border: 2.5px solid var(--purple);
    color: var(--purple);
    border-radius: 10px;
    padding: 0.4rem 0.8rem;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.12s, background 0.12s;
    user-select: none;
  }
  .word-tile:hover { transform: scale(1.08); background: var(--purple); color: #fff; }
  .word-tile.in-sentence { border-color: var(--blue); color: var(--blue); }
  .word-tile.in-sentence:hover { background: var(--blue); color: #fff; }

  /* Feedback */
  .feedback {
    margin-top: 0.8rem;
    padding: 0.7rem 1rem;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.95rem;
    display: none;
  }
  .feedback.show { display: block; animation: pop 0.25s ease; }
  @keyframes pop { 0%{transform:scale(0.8)} 100%{transform:scale(1)} }
  .feedback.correct { background: #E8F5E9; color: #2E7D32; }
  .feedback.wrong   { background: #FFEBEE; color: #C62828; }

  /* Nav buttons */
  .nav-row {
    display: flex;
    justify-content: flex-end;
    gap: 0.7rem;
    margin-top: 1rem;
  }
  .btn-check, .btn-next {
    padding: 0.75rem 1.8rem;
    border-radius: 999px;
    border: none;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-check {
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff;
    box-shadow: 0 4px 16px rgba(33,150,243,0.35);
  }
  .btn-check:hover { transform: scale(1.05); }
  .btn-next {
    background: linear-gradient(135deg, var(--green), #00BCD4);
    color: #fff;
    box-shadow: 0 4px 16px rgba(45,198,83,0.35);
    display: none;
  }
  .btn-next:hover { transform: scale(1.05); }

  /* === RESULT SCREEN === */
  #result {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .result-card {
    background: var(--card);
    border-radius: 32px;
    padding: 2.5rem 2rem;
    max-width: 520px;
    width: 100%;
    box-shadow: var(--shadow);
    text-align: center;
    border: 4px solid var(--green);
    animation: slideIn 0.5s ease;
  }
  .result-emoji { font-size: 5rem; margin-bottom: 0.5rem; animation: bounce 1.5s ease-in-out infinite; }
  .result-card h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: var(--orange);
    margin-bottom: 0.4rem;
  }
  .score-circle {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--green), var(--yellow));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 1rem auto;
    box-shadow: 0 8px 24px rgba(45,198,83,0.35);
  }
  .score-num {
    font-family: 'Baloo 2', cursive;
    font-size: 2.5rem;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .score-total { font-size: 0.9rem; color: rgba(255,255,255,0.85); font-weight: 700; }
  .grade-msg { font-size: 1.1rem; color: #555; margin-bottom: 1.5rem; font-weight: 600; }

  .section-scores {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }
  .sec-score-item {
    background: #F5F5F5;
    border-radius: 12px;
    padding: 0.6rem 0.8rem;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sec-score-item .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .btn-retry {
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: #fff;
    border: none;
    padding: 0.9rem 2.2rem;
    border-radius: 999px;
    font-size: 1.1rem;
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,112,67,0.4);
    transition: transform 0.15s;
  }
  .btn-retry:hover { transform: scale(1.06); }

  /* Celebration particles */
  .particle {
    position: fixed;
    font-size: 1.5rem;
    pointer-events: none;
    z-index: 999;
    animation: fall 3s ease forwards;
  }
  @keyframes fall {
    0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  @media (max-width: 480px) {
    .hero-box h1 { font-size: 1.9rem; }
    .q-text { font-size: 1rem; }
    .quiz-header { flex-wrap: wrap; }
    .section-scores { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Floating background emojis -->
<div class="floating-emoji" style="left:5%;animation-delay:0s;animation-duration:9s">📚</div>
<div class="floating-emoji" style="left:20%;animation-delay:2s;animation-duration:11s">✏️</div>
<div class="floating-emoji" style="left:40%;animation-delay:4s;animation-duration:8s">🌟</div>
<div class="floating-emoji" style="left:60%;animation-delay:1s;animation-duration:10s">🎯</div>
<div class="floating-emoji" style="left:80%;animation-delay:3s;animation-duration:12s">🏆</div>
<div class="floating-emoji" style="left:92%;animation-delay:5s;animation-duration:9s">🎉</div>

<!-- =========  WELCOME SCREEN  ========= -->
<div id="welcome" class="screen active">
  <div class="hero-box">
    <div class="hero-mascot">🦁</div>
    <h1>English Quest!</h1>
    <p class="subtitle">Yuk, uji kemampuan bahasa Inggris kamu! 🎮</p>
    <div class="badge-row">
      <span class="badge vocab">📖 Vocabulary</span>
      <span class="badge plural">🔢 Singular &amp; Plural</span>
      <span class="badge tense">⏰ Simple Present</span>
    </div>
    <input class="name-input" type="text" id="playerName" placeholder="Tulis nama kamu di sini... 😊" maxlength="30">
    <br>
    <button class="btn-start" onclick="startQuiz()">Mulai Sekarang! 🚀</button>
    <div class="info-strip">
      <span>🎯 20 Soal</span>
      <span>⭐ 4 Bagian</span>
      <span>🏆 Raih Nilai Tertinggi!</span>
    </div>
  </div>
</div>

<!-- =========  QUIZ SCREEN  ========= -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="player-name" id="displayName">Player</div>
    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel">1 / 20</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="score-badge">⭐ <span id="liveScore">0</span></div>
  </div>

  <div id="sectionLabel" class="section-label sec-verb">🔤 Section 1</div>

  <div class="question-card" id="questionCard">
    <div class="q-num" id="qNum">Question 1</div>
    <div class="q-text" id="qText"></div>
    <div id="storyBox" class="story-box" style="display:none"></div>
    <div id="answerArea"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav-row">
      <button class="btn-check" id="btnCheck" onclick="checkAnswer()">Check ✔️</button>
      <button class="btn-next"  id="btnNext"  onclick="nextQuestion()">Next ➡️</button>
    </div>
  </div>
</div>

<!-- =========  RESULT SCREEN  ========= -->
<div id="result" class="screen">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <h2 id="resultTitle">Luar Biasa!</h2>
    <div class="score-circle">
      <div class="score-num" id="finalScore">0</div>
      <div class="score-total">dari 20</div>
    </div>
    <p class="grade-msg" id="gradeMsg"></p>
    <div class="section-scores" id="sectionScores"></div>
    <button class="btn-retry" onclick="retryQuiz()">🔄 Coba Lagi!</button>
  </div>
</div>

<script>
// ==============================
// QUESTIONS DATA
// ==============================
const questions = [

  // --- SECTION 1: Right Verb (s/es) --- Q1–5
  {
    section: 1,
    type: 'verb',
    text: 'Budi ___ to school every day.',
    options: ['go', 'goes'],
    answer: 'goes',
    tip: 'Karena subjeknya "Budi" (he/she/it), kita pakai verb + <b>s</b> → <b>goes</b>!'
  },
  {
    section: 1,
    type: 'verb',
    text: 'The children ___ in the yard after school.',
    options: ['play', 'plays'],
    answer: 'play',
    tip: '"The children" adalah plural (lebih dari satu), jadi pakai verb biasa → <b>play</b>!'
  },
  {
    section: 1,
    type: 'verb',
    text: 'My mother ___ rice every morning.',
    options: ['cook', 'cooks'],
    answer: 'cooks',
    tip: '"My mother" = she, jadi verb + <b>s</b> → <b>cooks</b>!'
  },
  {
    section: 1,
    type: 'verb',
    text: 'The birds ___ beautifully in the tree.',
    options: ['sing', 'sings'],
    answer: 'sing',
    tip: '"The birds" adalah plural, pakai verb biasa → <b>sing</b>!'
  },
  {
    section: 1,
    type: 'verb',
    text: 'Rini ___ the bus to get to her school.',
    options: ['catch', 'catches'],
    answer: 'catches',
    tip: '"Rini" = she. Verb berakhiran -ch, jadi tambahkan <b>-es</b> → <b>catches</b>!'
  },

  // --- SECTION 2: Multiple Choice --- Q6–10
  {
    section: 2,
    type: 'mc',
    text: 'What is the plural form of "child"?',
    choices: ['childs', 'childes', 'children', 'childer'],
    answer: 'children',
    tip: '"Child" punya bentuk plural yang tidak beraturan → <b>children</b>!'
  },
  {
    section: 2,
    type: 'mc',
    text: 'Choose the correct sentence!',
    choices: [
      'She don\'t like vegetables.',
      'She doesn\'t likes vegetables.',
      'She doesn\'t like vegetables.',
      'She not like vegetables.'
    ],
    answer: 'She doesn\'t like vegetables.',
    tip: 'Kalimat negatif he/she/it pakai <b>doesn\'t + verb biasa</b> → doesn\'t like!'
  },
  {
    section: 2,
    type: 'mc',
    text: 'What is the meaning of "market" in Bahasa Indonesia?',
    choices: ['Toko', 'Pasar', 'Warung', 'Kantin'],
    answer: 'Pasar',
    tip: '"Market" artinya <b>Pasar</b> — tempat jual beli!'
  },
  {
    section: 2,
    type: 'mc',
    text: 'Which word is an antonym (lawan kata) of "cheap"?',
    choices: ['Small', 'Expensive', 'Beautiful', 'Fast'],
    answer: 'Expensive',
    tip: 'Lawan kata "cheap" (murah) adalah <b>expensive</b> (mahal)!'
  },
  {
    section: 2,
    type: 'mc',

// ==============================
// STATE
// ==============================
let current = 0;
let score = 0;
let sectionScores = {1:0, 2:0, 3:0, 4:0};
let playerName = '';
let answered = false;

// For rearrange
let sentenceWords = [];
let poolWords = [];

const sectionMeta = {
  1: { label: '🔤 Pilih Verb yang Benar', cls: 'sec-verb',  color: '#2DC653' },
  2: { label: '📝 Pilihan Ganda',         cls: 'sec-mc',   color: '#2196F3' },
  3: { label: '📖 Isi Cerita',            cls: 'sec-fill', color: '#9C27B0' },
  4: { label: '🧩 Susun Kalimat (HOTS)',  cls: 'sec-rearr',color: '#E91E8C' }
};

// ==============================
// START
// ==============================
function startQuiz() {
  playerName = document.getElementById('playerName').value.trim() || 'Pelajar';
  document.getElementById('displayName').textContent = '👋 ' + playerName;
  showScreen('quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==============================
// RENDER QUESTION
// ==============================
function renderQuestion() {
  answered = false;
  const q = questions[current];

  // Progress
  const pct = (current / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = (current + 1) + ' / ' + questions.length;
  document.getElementById('liveScore').textContent = score;

  // Section label
  const sm = sectionMeta[q.section];
  const sl = document.getElementById('sectionLabel');
  sl.textContent = sm.label;
  sl.className = 'section-label ' + sm.cls;

  // Card border color
  document.getElementById('questionCard').style.borderTopColor = sm.color;

  // Q num & text
  document.getElementById('qNum').textContent = 'Soal ' + (current + 1) + ' dari ' + questions.length;
  document.getElementById('qText').textContent = q.text;

  // Story box
  const sb = document.getElementById('storyBox');
  if (q.type === 'fill') {
    sb.style.display = 'block';
    sb.innerHTML = q.story;
  } else {
    sb.style.display = 'none';
  }

  // Answer area
  const aa = document.getElementById('answerArea');
  aa.innerHTML = '';

  if (q.type === 'verb') {
    // Two big option buttons
    const div = document.createElement('div');
    div.className = 'options';
    ['A','B'].forEach((ltr, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.dataset.val = q.options[i];
      btn.innerHTML = `<span class="option-letter">${ltr}</span> ${q.options[i]}`;
      btn.onclick = () => { if (!answered) selectVerb(btn, q.options[i]); };
      div.appendChild(btn);
    });
    aa.appendChild(div);

  } else if (q.type === 'mc') {
    const div = document.createElement('div');
    div.className = 'options';
    ['A','B','C','D'].forEach((ltr, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.dataset.val = q.choices[i];
      btn.innerHTML = `<span class="option-letter">${ltr}</span> ${q.choices[i]}`;
      btn.onclick = () => { if (!answered) selectMC(btn, q.choices[i]); };
      div.appendChild(btn);
    });
    aa.appendChild(div);

  } else if (q.type === 'fill') {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'ans-input';
    inp.placeholder = 'Tulis jawaban kamu di sini...';
    inp.id = 'fillInput';
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !answered) checkAnswer(); });
    aa.appendChild(inp);
    setTimeout(() => inp.focus(), 100);

  } else if (q.type === 'rearr') {
    sentenceWords = [];
    poolWords = [...q.words];

    const dropLabel = document.createElement('div');
    dropLabel.className = 'drop-label';
    dropLabel.textContent = 'Klik kata di bawah untuk menyusun kalimat ⬇️';

    const sentDiv = document.createElement('div');
    sentDiv.className = 'sentence-drop';
    sentDiv.id = 'sentDrop';
    sentDiv.appendChild(dropLabel);

    const poolDiv = document.createElement('div');
    poolDiv.className = 'word-pool';
    poolDiv.id = 'wordPool';

    // Shuffle pool
    const shuffled = [...q.words].sort(() => Math.random() - 0.5);
    shuffled.forEach(w => {
      const tile = makeTile(w, poolDiv, sentDiv, false);
      poolDiv.appendChild(tile);
    });

    aa.appendChild(sentDiv);
    aa.appendChild(poolDiv);
  }

  // Feedback & buttons
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  document.getElementById('btnCheck').style.display = 'inline-block';
  document.getElementById('btnNext').style.display = 'none';
}

function makeTile(word, poolDiv, sentDiv, inSentence) {
  const tile = document.createElement('div');
  tile.className = 'word-tile' + (inSentence ? ' in-sentence' : '');
  tile.textContent = word;
  tile.onclick = () => {
    if (answered) return;
    if (!tile.classList.contains('in-sentence')) {
      // Move to sentence
      tile.classList.add('in-sentence');
      const label = sentDiv.querySelector('.drop-label');
      if (label) label.remove();
      sentDiv.appendChild(tile);
      sentenceWords.push(word);
    } else {
      // Move back to pool
      tile.classList.remove('in-sentence');
      poolDiv.appendChild(tile);
      sentenceWords = sentenceWords.filter(w => w !== word);
      // If need same word multiple times — handle by index is simplified here
      if (sentDiv.children.length === 0) {
        const dl = document.createElement('div');
        dl.className = 'drop-label';
        dl.textContent = 'Klik kata di bawah untuk menyusun kalimat ⬇️';
        sentDiv.appendChild(dl);
      }
    }
  };
  return tile;
}

// ==============================
// SELECT HANDLERS
// ==============================
let selectedVerb = null;
let selectedMC   = null;

function selectVerb(btn, val) {
  document.querySelectorAll('.option-btn').forEach(b => b.style.background = '');
  btn.style.background = '#E3F2FD';
  btn.style.borderColor = '#2196F3';
  selectedVerb = val;
}

function selectMC(btn, val) {
  document.querySelectorAll('.option-btn').forEach(b => {
    b.style.background = ''; b.style.borderColor = '';
  });
  btn.style.background = '#E3F2FD';
  btn.style.borderColor = '#2196F3';
  selectedMC = val;
}

// ==============================
// CHECK ANSWER
// ==============================
function checkAnswer() {
  if (answered) return;
  const q = questions[current];
  let userAns = '';
  let correct = false;

  if (q.type === 'verb') {
    if (!selectedVerb) { shake(); return; }
    userAns = selectedVerb;
    correct = userAns.toLowerCase() === q.answer.toLowerCase();
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.disabled = true;
      btn.style.background = '';
      btn.style.borderColor = '';
      if (btn.dataset.val.toLowerCase() === q.answer.toLowerCase()) {
        btn.classList.add('correct');
      } else if (btn.dataset.val === userAns && !correct) {
        btn.classList.add('wrong');
      }
    });
    selectedVerb = null;

  } else if (q.type === 'mc') {
    if (!selectedMC) { shake(); return; }
    userAns = selectedMC;
    correct = userAns === q.answer;
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.disabled = true;
      btn.style.background = '';
      btn.style.borderColor = '';
      if (btn.dataset.val === q.answer) {
        btn.classList.add('correct');
      } else if (btn.dataset.val === userAns && !correct) {
        btn.classList.add('wrong');
      }
    });
    selectedMC = null;

  } else if (q.type === 'fill') {
    const inp = document.getElementById('fillInput');
    userAns = inp.value.trim().toLowerCase();
    correct = userAns === q.answer.toLowerCase();
    inp.disabled = true;
    inp.classList.add(correct ? 'correct' : 'wrong');

  } else if (q.type === 'rearr') {
    userAns = sentenceWords.join(' ').toLowerCase().trim();
    correct = userAns === q.answer.toLowerCase().trim();
    // Highlight tiles
    const sentDiv = document.getElementById('sentDrop');
    if (sentDiv) sentDiv.style.background = correct ? '#E8F5E9' : '#FFEBEE';
  }

  answered = true;
  if (correct) {
    score++;
    sectionScores[q.section]++;
  }

  showFeedback(correct, q.tip);
  document.getElementById('btnCheck').style.display = 'none';
  document.getElementById('btnNext').style.display = 'inline-block';
  document.getElementById('liveScore').textContent = score;
}

function showFeedback(correct, tip) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = correct
    ? `✅ <b>Benar!</b> ${tip}`
    : `❌ <b>Salah.</b> ${tip}`;
}

function shake() {
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.style.transform = 'translateX(-8px)';
  setTimeout(() => { card.style.transform = 'translateX(8px)'; }, 80);
  setTimeout(() => { card.style.transform = ''; card.style.animation = ''; }, 160);
}

// ==============================
// NEXT
// ==============================
function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ==============================
// RESULT
// ==============================
function showResult() {
  showScreen('result');
  document.getElementById('finalScore').textContent = score;

  let emoji, title, msg;
  const pct = score / questions.length;
  if (pct === 1) {
    emoji = '🏆'; title = 'SEMPURNA!';
    msg = 'Kamu luar biasa! Nilai kamu 100! Kamu bintang bahasa Inggris! ⭐';
  } else if (pct >= 0.8) {
    emoji = '🎉'; title = 'Hebat Sekali!';
    msg = 'Hampir sempurna! Terus berlatih dan kamu pasti bisa 100! 💪';
  } else if (pct >= 0.6) {
    emoji = '😊'; title = 'Bagus!';
    msg = 'Kerja bagus! Belajar lagi untuk hasil yang lebih baik! 📚';
  } else if (pct >= 0.4) {
    emoji = '🌱'; title = 'Terus Semangat!';
    msg = 'Jangan menyerah! Ulangi materi dan coba lagi! 💡';
  } else {
    emoji = '📖'; title = 'Ayo Belajar Lagi!';
    msg = 'Tidak apa-apa! Belajar lagi dan kamu pasti bisa lebih baik! 🌟';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('gradeMsg').textContent = msg;

  const secScoreDiv = document.getElementById('sectionScores');
  const secInfo = [
    { label: '🔤 Verb s/es',     s: 1, color: '#2DC653' },
    { label: '📝 Pilihan Ganda', s: 2, color: '#2196F3' },
    { label: '📖 Isi Cerita',    s: 3, color: '#9C27B0' },
    { label: '🧩 Susun Kalimat', s: 4, color: '#E91E8C' }
  ];
  secScoreDiv.innerHTML = secInfo.map(si =>
    `<div class="sec-score-item">
      <span><span class="dot" style="background:${si.color}"></span>${si.label}</span>
      <b>${sectionScores[si.s]}/5</b>
    </div>`
  ).join('');

  if (pct >= 0.6) celebrate();
}

function celebrate() {
  const emojis = ['🎉','🌟','⭐','🎊','✨','🏆','🎈'];
  for (let i = 0; i < 18; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (2 + Math.random() * 2) + 's';
      el.style.fontSize = (1.2 + Math.random()) + 'rem';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 120);
  }
}

// ==============================
// RETRY
// ==============================
function retryQuiz() {
  current = 0;
  score = 0;
  sectionScores = {1:0, 2:0, 3:0, 4:0};
  answered = false;
  selectedVerb = null;
  selectedMC   = null;
  sentenceWords = [];
  showScreen('welcome');
}
</script>
